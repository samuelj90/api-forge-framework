openapi: "3.0.3"
info:
  title: Hello API
  version: "1.0.0"
servers:
  - url: http://localhost:8080/api/v1
paths:
  /greetings:
    post:
      operationId: createGreeting
      summary: Create a greeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGreetingRequest'
      responses:
        '201':
          description: Greeting created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GreetingResponse'
        '400':
          description: Validation error
    delete:
      operationId: deleteGreeting
      summary: Delete a greeting
      parameters:
        - name: greetingId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted
  /greetings/{greetingId}:
    get:
      operationId: getGreeting
      summary: Get a greeting by ID
      parameters:
        - name: greetingId
          in: path
          required: true
          schema:
            type: string
        - name: includeDetails
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GreetingResponse'
        '404':
          description: Not found

  /greetings/batch:
    post:
      operationId: createGreetings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateGreetingRequest'
      responses:
        '200':
          description: Batch created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GreetingResponse'
components:
  schemas:
    CreateGreetingRequest:
      type: object
      required: [message, recipient]
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 500
          pattern: '^[a-zA-Z0-9\s.,!?-]+$'
        recipient:
          type: string
          minLength: 1
        priority:
          type: integer
          minimum: 1
          maximum: 5

    GreetingResponse:
      type: object
      properties:
        id:
          type: string
        message:
          type: string
        recipient:
          type: string
        createdAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true