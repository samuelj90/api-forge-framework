spring:
  application:
    name: orders-service
  datasource:
    url: jdbc:h2:mem:ordersdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

# ─────────────────────────────────────────────────────────────────────────────
# API-Forge Runtime Configuration
# ─────────────────────────────────────────────────────────────────────────────
forge:
  ingress:
    log-requests: true
    expose-stack-traces: false   # set true in dev profile only
    default-page-size: 20
    max-page-size: 200

  egress:
    # ── Inventory upstream ─────────────────────────────────────────────────
    inventory:
      base-url: ${INVENTORY_BASE_URL:https://inventory.internal}
      timeout-ms: 3000
      max-connections: 200
      auth:
        type: BEARER_TOKEN
        token-provider: env
        token: ${INVENTORY_API_TOKEN:dev-token-replace-in-prod}
      resilience:
        circuit-breaker:
          enabled: true
          failure-rate-threshold: 50
          slow-call-rate-threshold: 80
          slow-call-duration-threshold-ms: 2000
          sliding-window-size: 10
          minimum-number-of-calls: 5
          wait-duration-in-open-state-ms: 30000
          permitted-calls-in-half-open-state: 3
        retry:
          enabled: true
          max-attempts: 3
          wait-duration-ms: 300
          exponential-backoff: true
          exponential-multiplier: 2.0
          max-wait-duration-ms: 5000
        bulkhead:
          enabled: true
          max-concurrent-calls: 25
          max-wait-duration-ms: 100

    # ── Payment upstream ───────────────────────────────────────────────────
    payment:
      base-url: ${PAYMENT_BASE_URL:https://payment.internal}
      timeout-ms: 8000
      max-connections: 100
      auth:
        type: OAUTH2_CLIENT_CREDENTIALS
        client-id: ${PAYMENT_CLIENT_ID:orders-service}
        client-secret: ${PAYMENT_CLIENT_SECRET:change-me}
        token-url: ${PAYMENT_TOKEN_URL:https://auth.internal/oauth2/token}
      resilience:
        circuit-breaker:
          enabled: true
          failure-rate-threshold: 30   # stricter for payments
          sliding-window-size: 20
          minimum-number-of-calls: 10
          wait-duration-in-open-state-ms: 60000
        retry:
          enabled: true
          max-attempts: 2             # fewer retries for payment (idempotency risk)
          wait-duration-ms: 1000
          exponential-backoff: false
        time-limiter:
          enabled: true
          timeout-duration: 7s

# ─────────────────────────────────────────────────────────────────────────────
# Resilience4j (global fallback config — per-client overrides above take precedence)
# ─────────────────────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
  retry:
    configs:
      default:
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException.InternalServerError
          - org.springframework.web.reactive.function.client.WebClientRequestException
        ignore-exceptions:
          - org.apiforgeframework.runtime.exception.ForgeExceptions.ForgeEgressException

# ─────────────────────────────────────────────────────────────────────────────
# Actuator & Observability
# ─────────────────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, circuitbreakers, retries, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0   # 100% in dev; tune per environment
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# ─────────────────────────────────────────────────────────────────────────────
# SpringDoc / Swagger UI
# ─────────────────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true

# ─────────────────────────────────────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────────────────────────────────────
logging:
  level:
    com.company.orders: DEBUG
    org.apiforgeframework: INFO
    org.springframework.web: INFO
    io.github.resilience4j: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"

---
# ─────────────────────────────────────────────────────────────────────────────
# Test profile overrides
# ─────────────────────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: test
  jpa:
    show-sql: true

forge:
  egress:
    inventory:
      # WireMock port set dynamically by @ForgeEgressTest extension
      base-url: ${forge.egress.inventory.base-url:http://localhost:8089}
      auth:
        type: NONE   # no auth in tests
      resilience:
        circuit-breaker:
          enabled: false   # disable CB in unit/integration tests for predictability
        retry:
          enabled: false
    payment:
      base-url: ${forge.egress.payment.base-url:http://localhost:8090}
      auth:
        type: NONE
      resilience:
        circuit-breaker:
          enabled: false
        retry:
          enabled: false

management:
  tracing:
    sampling:
      probability: 0.0   # no tracing overhead in tests
